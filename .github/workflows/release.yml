name: Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Git tag or branch to deploy
        required: true
        default: main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter analyze
        working-directory: apps/daily_rashan
        run: flutter pub get && flutter analyze lib

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/api:${{ inputs.git_ref }} ./backend
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/${{ github.repository }}/api:${{ inputs.git_ref }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: inputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Staging deploy placeholder
        run: |
          echo "Deploy ghcr.io/${{ github.repository }}/api:${{ inputs.git_ref }} to staging"
          echo "Run scripts/deploy.sh on staging host with API_IMAGE tag"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Production deploy placeholder
        run: |
          echo "Deploy ghcr.io/${{ github.repository }}/api:${{ inputs.git_ref }} to production"
          echo "Follow docs/RELEASE_CHECKLIST.md and docs/ROLLBACK_GUIDE.md"
