global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: daily-rashan-api
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: api
          env: production

  - job_name: daily-rashan-health
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:3000']
