version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: daily_rashan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rashan
      POSTGRES_PASSWORD: rashan_secret
      POSTGRES_DB: daily_rashan
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rashan -d daily_rashan']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daily_rashan_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daily_rashan_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rashan:rashan_secret@postgres:5432/daily_rashan?schema=public
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
